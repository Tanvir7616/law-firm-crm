<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact | Khandokar Associates</title>

<link rel="stylesheet" href="assets/style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">Khandokar Associates</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="cases.html">Cases</a>
    <a href="contact.html" class="btn">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="contact-hero">
  <h1>Contact Our Legal Expert</h1>
  <p>We respond within 24 hours</p>
</section>

<!-- CONTACT AREA -->
<section class="contact-wrapper">

  <!-- INFO CARD -->
  <div class="contact-card info-card">

    <h2>Get In Touch</h2>

    <div class="info-item">📍 Dhaka, Bangladesh</div>

    <div class="info-item">
      📞 <a href="tel:+8801XXXXXXXXX">Call Now</a>
    </div>

    <div class="info-item">
      💬 <a href="https://wa.me/8801XXXXXXXXX" target="_blank">WhatsApp Chat</a>
    </div>

    <!-- QR -->
    <div class="qr-card">
      <p>Scan to Chat on WhatsApp</p>
      <img src="assets/images/whatsapp-qr.png" alt="QR Code">
    </div>

  </div>

  <!-- FORM CARD -->
  <div class="contact-card form-card">

    <h2>Send Message</h2>

    <form id="contactForm">

      <div class="input-group">
        <input type="text" id="name" required>
        <label>Your Name</label>
      </div>

      <div class="input-group">
        <input type="email" id="email" required>
        <label>Email</label>
      </div>

      <div class="input-group">
        <textarea id="message" required></textarea>
        <label>Your Message</label>
      </div>

      <button type="submit">Send Message</button>

    </form>

  </div>

</section>

<!-- JS CONNECT TO BACKEND -->
<script>
document.getElementById("contactForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  try {
    const res = await fetch("http://localhost:5000/api/contact", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, email, message })
    });

    const data = await res.json();

    if (data.success) {
      alert("✅ Message sent successfully!");
      document.getElementById("contactForm").reset();
    } else {
      alert("❌ Something went wrong!");
    }

  } catch (error) {
    alert("❌ Server error!");
  }
});
</script>

</body>
</html>
