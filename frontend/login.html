<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body{
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

.login-box{
  background:white;
  padding:40px;
  border-radius:10px;
  width:350px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
  margin-bottom:20px;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  width:100%;
  padding:12px;
  background:#0f172a;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:6px;
  font-size:16px;
}

button:hover{
  background:#1e293b;
}

.error{
  color:red;
  text-align:center;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="login-box">

<h2>⚖️ Admin Login</h2>

<div class="error" id="error"></div>

<form id="loginForm">

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){

e.preventDefault();

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
const errorDiv = document.getElementById("error");

errorDiv.innerText = "";

try {

const res = await fetch("https://law-firm-crm-1.onrender.com/api/auth/login", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
email,
password
})
});

const data = await res.json();

console.log(data);

if(data.success){

// save token
localStorage.setItem("token", data.token);

// redirect
window.location.href = "admin.html";

}else{

errorDiv.innerText = data.message || "Login failed";

}

} catch(err){

errorDiv.innerText = "Server error";

console.log(err);

}

});
</script>

</body>
</html>
