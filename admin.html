<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CRM Admin Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  padding:30px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:20px;
}

.box{
  background:#1e293b;
  padding:15px;
  text-align:center;
  border-radius:10px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
}

#list, #caseList{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:15px;
}

.card{
  background:white;
  color:black;
  padding:15px;
  border-radius:10px;
}

button{
  margin-top:8px;
  padding:8px;
  border:none;
  cursor:pointer;
  border-radius:6px;
}
</style>

</head>

<body>

<div class="top">
  <h2>CRM Dashboard</h2>
  <button onclick="logout()">Logout</button>
</div>

<script>
const API = "https://law-firm-crm-1.onrender.com";
const token = localStorage.getItem("token");

if(!token){
  alert("Login first");
  window.location.href="login.html";
}

function logout(){
  localStorage.removeItem("token");
  window.location.href="login.html";
}
</script>

<!-- ================= CONTACT STATS ================= -->
<div class="stats">
  <div class="box">Total: <span id="total">0</span></div>
  <div class="box">Unread: <span id="unread">0</span></div>
  <div class="box">Resolved: <span id="resolved">0</span></div>
</div>

<input id="search" placeholder="Search contacts..." onkeyup="loadData()" />

<div id="list">Loading contacts...</div>

<hr style="margin:30px 0;">

<!-- ================= CASE SECTION ================= -->
<h2>📁 Case Management</h2>

<div class="card">
  <input id="caseTitle" placeholder="Case Title">
  <input id="clientName" placeholder="Client Name">
  <textarea id="caseDesc" placeholder="Case Description"></textarea>

  <button onclick="addCase()">➕ Add Case</button>
</div>

<div id="caseList">Loading cases...</div>

<script>

/* ================= CONTACT STATS ================= */
async function loadStats(){

  const res = await fetch(`${API}/api/admin/stats`,{
    headers:{ Authorization:"Bearer " + token }
  });

  const result = await res.json();
  const d = result.data || {};

  document.getElementById("total").innerText = d.total || 0;
  document.getElementById("unread").innerText = d.unread || 0;
  document.getElementById("resolved").innerText = d.resolved || 0;
}

/* ================= CONTACT LIST ================= */
async function loadData(){

  const search = document.getElementById("search").value;

  const res = await fetch(
    `${API}/api/admin/contacts?search=${search}`,
    { headers:{ Authorization:"Bearer " + token } }
  );

  const result = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  const contacts = result.data || [];

  if(contacts.length === 0){
    list.innerHTML = "<h3>No messages found</h3>";
    return;
  }

  contacts.forEach(item => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${item.name}</h3>
      <p>${item.email}</p>
      <p>${item.message}</p>
      <button onclick="deleteMsg('${item._id}')">Delete</button>
    `;

    list.appendChild(div);
  });
}

/* ================= DELETE CONTACT ================= */
async function deleteMsg(id){

  await fetch(`${API}/api/admin/contact/${id}`,{
    method:"DELETE",
    headers:{ Authorization:"Bearer " + token }
  });

  loadData();
  loadStats();
}

/* ================= ADD CASE ================= */
async function addCase(){

  const data = {
    title: document.getElementById("caseTitle").value,
    clientName: document.getElementById("clientName").value,
    description: document.getElementById("caseDesc").value
  };

  const res = await fetch(`${API}/api/admin/case`,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer " + token
    },
    body: JSON.stringify(data)
  });

  const result = await res.json();

  if(result.success){
    alert("Case Added Successfully ✅");

    document.getElementById("caseTitle").value = "";
    document.getElementById("clientName").value = "";
    document.getElementById("caseDesc").value = "";
  }

  loadCases();
}

/* ================= LOAD CASES ================= */
async function loadCases(){

  const res = await fetch(`${API}/api/admin/case`,{
    headers:{ Authorization:"Bearer " + token }
  });

  const result = await res.json();

  const list = document.getElementById("caseList");
  list.innerHTML = "";

  const cases = result.data || [];

  if(cases.length === 0){
    list.innerHTML = "<h3>No cases found</h3>";
    return;
  }

  cases.forEach(c => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${c.title}</h3>
      <p><b>Client:</b> ${c.clientName}</p>
      <p>${c.description}</p>
      <small>Status: ${c.status}</small>
    `;

    list.appendChild(div);
  });
}

/* INIT */
loadData();
loadStats();
loadCases();

</script>

</body>
</html>
